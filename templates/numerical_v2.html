<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Clinical CKD Prediction</title>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style_v2.css') }}">

</head>

<body class="clinical-v2-page">

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <div class="sidebar-logo">

            <img src="{{ url_for('static', filename='logo.png') }}">

            <h2>KidneyAI</h2>

            <p>Multimodal CKD Platform</p>

        </div>

        <ul class="sidebar-menu">

            <li>
                <a href="/">
                    <i class="fas fa-house"></i>
                    Dashboard
                </a>
            </li>

            <li class="active">
                <a href="#">
                    <i class="fas fa-heart-pulse"></i>
                    Clinical Prediction
                </a>
            </li>

            <li>
                <a href="/ultrasound">
                    <i class="fas fa-x-ray"></i>
                    Ultrasound
                </a>
            </li>

            <li>
                <a href="/combined">
                    <i class="fas fa-brain"></i>
                    Multimodal
                </a>
            </li>

            <li>
                <a href="/reports">
                    <i class="fas fa-file-medical"></i>
                    Reports
                </a>
            </li>

        </ul>

    </aside>

    <!-- MAIN -->

    <main class="main-content">

        <section class="topbar">

            <h1>Clinical CKD Prediction</h1>

            <p>
                Predict Chronic Kidney Disease using
                patient clinical and laboratory data
            </p>

        </section>

        <!-- FORM CARD -->

        <div class="clinical-form-card">

            <h2>

                <i class="fas fa-user-doctor"></i>

                Patient Clinical Information

            </h2>

            <form method="POST"
                  action="/predict_numerical">

                <div class="clinical-grid">

                    <div class="form-group">
                        <label>Age</label>
                        <input type="number"
                               name="age"
                               required>
                    </div>

                    <div class="form-group">
                        <label>Blood Pressure</label>
                        <input type="number"
                               name="bp"
                               required>
                    </div>

                    <div class="form-group">
                        <label>Specific Gravity</label>
                        <input type="number"
                               step="0.001"
                               name="sg"
                               required>
                    </div>

                    <div class="form-group">
                        <label>Albumin</label>
                        <input type="number"
                               name="al"
                               required>
                    </div>

                    <div class="form-group">
                        <label>Sugar</label>
                        <input type="number"
                               name="su"
                               required>
                    </div>

                    <div class="form-group">
                        <label>Blood Glucose</label>
                        <input type="number"
                               name="bgr"
                               required>
                    </div>

                    <div class="form-group">
                        <label>Blood Urea</label>
                        <input type="number"
                               name="bu"
                               required>
                    </div>

                    <div class="form-group">
                        <label>Serum Creatinine</label>
                        <input type="number"
                               step="0.1"
                               name="sc"
                               required>
                    </div>

                    <div class="form-group">
                        <label>Sodium</label>
                        <input type="number"
                               name="sod"
                               required>
                    </div>

                    <div class="form-group">
                        <label>Potassium</label>
                        <input type="number"
                               step="0.1"
                               name="pot"
                               required>
                    </div>

                    <div class="form-group">
                        <label>Hemoglobin</label>
                        <input type="number"
                               step="0.1"
                               name="hemo"
                               required>
                    </div>

                    <div class="form-group">
                        <label>Packed Cell Volume</label>
                        <input type="number"
                               name="pcv"
                               required>
                    </div>

                    <div class="form-group">
                        <label>White Blood Cell Count</label>
                        <input type="number"
                               name="wc"
                               required>
                    </div>

                    <div class="form-group">
                        <label>Red Blood Cell Count</label>
                        <input type="number"
                               step="0.1"
                               name="rc"
                               required>
                    </div>

                    <div class="form-group">
                        <label>Hypertension</label>

                        <select name="htn">
                            <option value="0">No</option>
                            <option value="1">Yes</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Diabetes Mellitus</label>

                        <select name="dm">
                            <option value="0">No</option>
                            <option value="1">Yes</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Coronary Artery Disease</label>

                        <select name="cad">
                            <option value="0">No</option>
                            <option value="1">Yes</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Pedal Edema</label>

                        <select name="pe">
                            <option value="0">No</option>
                            <option value="1">Yes</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Anemia</label>

                        <select name="ane">
                            <option value="0">No</option>
                            <option value="1">Yes</option>
                        </select>
                    </div>

                </div>

                <div class="submit-area">

                    <button type="submit"
                            class="predict-btn">

                        Predict CKD Risk

                    </button>

                </div>

            </form>

        </div>

    </main>

</body>
</html>
